# Hält die Render-Free-Tier-Services wach (schlafen sonst nach ~15 Min).
# Liegt im PUBLIC Repo wasteflow-landing → GitHub-Actions-Minuten gratis/unbegrenzt.
# Pfad im Repo: .github/workflows/keepalive.yml
name: keepalive
on:
  schedule:
    - cron: "*/10 * * * *" # alle 10 Min (GitHub-Cron kann +3–8 Min verzögern)
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping services
        run: |
          set -x
          curl -fsS -o /dev/null --max-time 60 --retry 2 https://wasteflow-backend.onrender.com/health || true
          curl -fsS -o /dev/null --max-time 60 --retry 2 https://wasteflow-frontend.onrender.com || true
          curl -fsS -o /dev/null --max-time 60 --retry 2 https://wasteflow-console.onrender.com || true
